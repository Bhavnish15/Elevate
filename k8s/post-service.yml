apiVersion: apps/v1
kind: Deployment
metadata:
  name: posts-service
spec:
  selector:
    matchLabels:
      app: posts-service
  template:
    metadata:
      labels:
        app: posts-service
    spec:
      containers:
      - name: posts-service
        image: bhavnishbhardwaj/post-service
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
          requests:
            memory: "256Mi"
            cpu: "200m"
        env:
          - name: SPRING_PROFILES_ACTIVE
            value: k8s
          - name: DB_USERNAME
            value: user
          - name: DB_PASSWORD
            value: "1001"
          - name: DB_SERVER
            value: post-db
          - name: DB_NAME
            value: postDB
        ports:
          - containerPort: 9010

---
apiVersion: v1
kind: Service
metadata:
  name: post-service
spec:
  selector:
    app: posts-service
  ports:
  - port: 80
    targetPort: 9010